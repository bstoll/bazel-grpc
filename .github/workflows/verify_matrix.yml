name: Verify Matrix

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:
    inputs:
      bazel:
        description: 'Bazel versions'
        required: false
        default: '7,8,9'
      grpc:
        description: 'gRPC version'
        required: false
        default: ''
      proto:
        description: 'Protobuf version'
        required: false
        default: ''
      rules_go:
        description: 'rules_go version'
        required: false
        default: ''
      rules_cc:
        description: 'rules_cc version'
        required: false
        default: ''

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push results
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Run verification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          declare -a ARGS
          if [ -n "${{ inputs.bazel }}" ]; then ARGS+=("-bazel=${{ inputs.bazel }}"); fi
          if [ -n "${{ inputs.grpc }}" ]; then ARGS+=("-grpc=${{ inputs.grpc }}"); fi
          if [ -n "${{ inputs.proto }}" ]; then ARGS+=("-proto=${{ inputs.proto }}"); fi
          if [ -n "${{ inputs.rules_go }}" ]; then ARGS+=("-rules_go=${{ inputs.rules_go }}"); fi
          if [ -n "${{ inputs.rules_cc }}" ]; then ARGS+=("-rules_cc=${{ inputs.rules_cc }}"); fi
          go run . "${ARGS[@]}"

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json results.md
          if [ -d logs ]; then git add logs/; fi
          git diff --staged --quiet || (git commit -m "Update matrix results" && git push)
